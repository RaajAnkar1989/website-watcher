name: Check Availability

on:
  schedule:
    # Runs daily at 07:00 UTC. The dashboard's "Check frequency" setting
    # can rewrite this line for you (daily / twice daily / weekly).
    - cron: '0 7 * * *'
  workflow_dispatch: {}   # lets you trigger a manual check from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run watcher
        run: python scraper.py

      - name: Commit updated results
        run: |
          git config user.name "website-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/results.json docs/history/
          git diff --quiet --cached || git commit -m "Update results $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
